*{margin:0;padding:0;box-sizing:border-box}

.brand{display:flex;flex-direction:column;align-items:center;padding-top:42vh;margin-bottom:32px;width:100vw;margin-left:calc(-50vw + 50%)}

.week-list{display:flex;flex-direction:column;gap:10px}
.week-link{display:flex;align-items:center;justify-content:space-between;

.link-left{display:flex;align-items:center;gap:10px}
.week-link .date{font-weight:600;font-size:15px}
.badge-new{font-size:10px;padding:2px 8px;border-radius:8px;
  background:rgba(232,197,109,.15);color:#e8c56d;font-weight:600}
.week-link .arrow{width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:rgba(255,255,255,.04);
  font-size:14px;color:#4a5070;transition:all .2s}
.week-link:hover .arrow{background:rgba(232,197,109,.15);color:#e8c56d}
.footer{text-align:center;margin-top:48px;color:#2a2e40;font-size:11px;letter-spacing:2px}
@media(max-width:480px){body{padding:0 16px}

const C=document.getElementById("bg-canvas"),X=C.getContext("2d");
let W,H;
const S=50,R=S*.22;
function rs(){W=C.width=innerWidth;H=C.height=innerHeight}
addEventListener("resize",rs);rs();
class Ic{
 constructor(i,img){this.i=i;this.img=img;this.x=0;this.y=0;this.vx=0;this.vy=0;this.rot=0;this.o=1;this.s="I";this.t=0;this.rx()}
 rx(){this.x=S+10+Math.random()*(W-S*2-20)}
 sp(){this.rx();this.y=-S*2-Math.random()*50;this.vx=(Math.random()-.5)*.4;this.vy=0;this.rot=Math.random()*6.2832;this.o=1;this.s="F"}
 up(){
  switch(this.s){
   case"F":
    this.vy+=.22;this.x+=this.vx;this.y+=this.vy;
    this.rot+=this.vx*.04;
    if(this.y+S>=H-20){this.y=H-20-S;this.vy*=-.25;this.vx*=.88;if(Math.abs(this.vy)<.3){this.vy=0;this.s="R";this.t=100+~~(Math.random()*60)}}
    if(this.x<S){this.x=S;this.vx*=-.5}
    if(this.x>W-S){this.x=W-S;this.vx*=-.5}
    // 图标间碰撞
    for(let j=0;j<Ic.list.length;j++){const b=Ic.list[j];if(b===this||b.s==="I")continue;const dx=b.x-this.x,dy=b.y-this.y,d=Math.sqrt(dx*dx+dy*dy),m=S*2;if(d>=m||d===0)continue;const p=(m-d)/2,nx=dx/d,ny=dy/d;this.x-=nx*p;this.y-=ny*p;b.x+=nx*p;b.y+=ny*p;const dv=(this.vx-b.vx)*nx+(this.vy-b.vy)*ny;if(dv>0)continue;const im=dv/2*1.6;this.vx-=im*nx;this.vy-=im*ny;b.vx+=im*nx;b.vy+=im*ny}
    break;
   case"R":
    this.t--;this.rot+=this.vx*.015;this.rot+=Math.sin(Date.now()*.0015+this.i)*.004;this.vx*=.97;
    this.y=H-20-S+Math.sin(Date.now()*.0015+this.i*2)*1.5;
    if(this.t<=0){this.s="Fd";this.t=60}
    break;
   case"Fd":
    this.o-=1/60;this.t--;
    if(this.t<=0){this.o=0;this.s="I";this.t=100+~~(Math.random()*90)}
    break;
  }
 }
 dr(){
  if(this.s==="I")return;X.save();X.globalAlpha=Math.max(0,this.o);
  const s=S,r=R,x=this.x,y=this.y;
  X.translate(x,y);X.rotate(this.rot);
  X.beginPath();X.moveTo(-s+r,-s);X.lineTo(s-r,-s);X.quadraticCurveTo(s,-s,s,-s+r);
  X.lineTo(s,s-r);X.quadraticCurveTo(s,s,s-r,s);
  X.lineTo(-s+r,s);X.quadraticCurveTo(-s,s,-s,s-r);
  X.lineTo(-s,-s+r);X.quadraticCurveTo(-s,-s,-s+r,-s);X.closePath();X.clip();
  if(this.img&&this.img.complete)X.drawImage(this.img,-s,-s,s*2,s*2);
  X.strokeStyle="rgba(255,255,255,.08)";X.lineWidth=1;X.stroke();X.restore()
 }
}
Ic.list=[];
